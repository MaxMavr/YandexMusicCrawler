<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Артисты</title>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/reset.css') }}" />

</head>
<body>
